name: CI

on:
  pull_request:
  push:

jobs:
  unit-tests:
    strategy:
      matrix:
        os: [ubuntu-latest]
        node-version: [22.x, 24.x, 26.x]
        arch: [x64]

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.os }} / Node ${{ matrix.node-version }} ${{ matrix.arch }}

    steps:

      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install
        run: npm install && npm run postinstall

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test:coverage
