name: CI

on:
  pull_request:
  push:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:

      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install
        run: npm install && npm run postinstall

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test:coverage
