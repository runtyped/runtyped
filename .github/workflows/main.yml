name: CI

on:
  pull_request:
  push:

jobs:
  unit-tests:
    strategy:
      matrix:
        os: [ubuntu-latest]
        node-version: [22.x, 24.x, 26.x]
        arch: [x64]

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.os }} / Node ${{ matrix.node-version }} ${{ matrix.arch }}

    steps:

      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install
        run: npm install

      - name: Build @runtyped/type-compiler and patch the TypeScript compiler
        run: ./install-compiler.sh

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test:coverage
